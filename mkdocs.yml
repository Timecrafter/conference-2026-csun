site_name: CSUN AT Conference Analytics
site_description: Analytics and insights from the CSUN Assistive Technology Conference (2023-2026)
theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Conference Growth: conference-growth.md
  - Topics:
    - Overview: topics/index.md
    - Trends: topics/trends.md
    - AI & ML: topics/ai-ml.md
  - Organizations:
    - Overview: organizations/index.md
    - Trends: organizations/trends.md
  - Speakers:
    - Overview: speakers/index.md
    - Continuity: speakers/continuity.md
  - Knowledge Graph:
    - Overview: knowledge-graph/index.md
  - Methodology: methodology.md
